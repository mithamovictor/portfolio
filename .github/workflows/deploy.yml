name: Deploy Portfolio to Kubernetes

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NAMESPACE: portfolio
  APP_NAME: portfolio
  PNPM_VERSION: 10.28.0
  NODE_VERSION: 22

jobs:
  validate-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: 🔐 Validate required secrets and variables
        run: |
          MISSING_ITEMS=()

          # Check KUBE_CONFIG secret
          if [ -z "${{ secrets.KUBE_CONFIG }}" ]; then
            MISSING_ITEMS+=("KUBE_CONFIG (secret)")
          fi

          # Check DEV_TO_API_KEY_PORTFOLIO secret
          if [ -z "${{ secrets.DEV_TO_API_KEY_PORTFOLIO }}" ]; then
            MISSING_ITEMS+=("DEV_TO_API_KEY_PORTFOLIO (secret)")
          fi

          # Check BREVO_API_KEY_PORTFOLIO secret
          if [ -z "${{ secrets.BREVO_API_KEY_PORTFOLIO }}" ]; then
            MISSING_ITEMS+=("BREVO_API_KEY_PORTFOLIO (secret)")
          fi

          # Check DEV_TO_API_URL variable
          if [ -z "${{ vars.DEV_TO_API_URL }}" ]; then
            MISSING_ITEMS+=("DEV_TO_API_URL (variable)")
          fi

          if [ ${#MISSING_ITEMS[@]} -gt 0 ]; then
            echo "❌ Missing required secrets/variables:"
            printf '%s\n' "${MISSING_ITEMS[@]}"
            echo ""
            echo "📝 Please set the following in GitHub:"
            echo "   Repository Settings → Secrets and Variables → Actions"
            echo ""
            echo "Required secrets:"
            echo "  - KUBE_CONFIG: Your Kubernetes config file (base64 encoded)"
            echo "  - DEV_TO_API_KEY_PORTFOLIO: Dev.to API key for portfolio"
            echo "  - BREVO_API_KEY_PORTFOLIO: Brevo API key for email"
            echo ""
            echo "Required variables:"
            echo "  - DEV_TO_API_URL: Dev.to API base URL"
            exit 1
          fi

          echo "✅ All required secrets and variables are configured"

  code-security:
    needs: validate-secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: ⚡ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔒 Run security audit
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$GITHUB_REF_NAME" == "dev" ]] || [[ "$GITHUB_REF_NAME" == "staging" ]]; then
            pnpm audit --audit-level=low || true
          else
            pnpm audit --audit-level=high
          fi

      - name: 🔍 Run Semgrep security scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/ci

      - name: 🔐 Run Trivy vulnerability scan (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN'
          exit-code: '0'

  build:
    needs: validate-secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: 🔐 Run Trivy scan on Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          scanners: 'vuln'

  deploy:
    needs: [code-security, build]
    runs-on: [self-hosted, alma9]

    concurrency:
      group: deploy-portfolio-${{ github.ref_name }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: 🔧 Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: 🏗️ Configure kubectl context
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBE_CONFIG" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
          kubectl cluster-info

      - name: 📝 Create namespace
        env:
          NAMESPACE: ${{ env.NAMESPACE }}
        run: |
          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

      - name: 🔐 Create environment secret
        env:
          APP_NAME: ${{ env.APP_NAME }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY_PORTFOLIO }}
          DEV_TO_API_KEY: ${{ secrets.DEV_TO_API_KEY_PORTFOLIO }}
          DEV_TO_API_URL: ${{ vars.DEV_TO_API_URL }}
          NAMESPACE: ${{ env.NAMESPACE }}
        run: |
          kubectl create secret generic "$APP_NAME-env" \
            --from-literal=BREVO_API_KEY="$BREVO_API_KEY" \
            --from-literal=DEV_TO_API_KEY="$DEV_TO_API_KEY" \
            --from-literal=DEV_TO_API_URL="$DEV_TO_API_URL" \
            -n "$NAMESPACE" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: 💾 Save current deployment state
        id: previous-state
        continue-on-error: true
        env:
          APP_NAME: ${{ env.APP_NAME }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          NAMESPACE: ${{ env.NAMESPACE }}
        run: |
          DEPLOYMENT_NAME="$APP_NAME-$GITHUB_REF_NAME"
          echo "deployment_name=$DEPLOYMENT_NAME" >> $GITHUB_OUTPUT

          CURRENT_REPLICAS=$(kubectl get deployment "$DEPLOYMENT_NAME" -n "$NAMESPACE" -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "0")
          CURRENT_IMAGE=$(kubectl get deployment "$DEPLOYMENT_NAME" -n "$NAMESPACE" -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "")

          echo "current_replicas=$CURRENT_REPLICAS" >> $GITHUB_OUTPUT
          echo "current_image=$CURRENT_IMAGE" >> $GITHUB_OUTPUT

          if [ -n "$CURRENT_IMAGE" ]; then
            echo "✅ Saved previous deployment state:"
            echo "  - Replicas: $CURRENT_REPLICAS"
            echo "  - Image: $CURRENT_IMAGE"
          else
            echo "ℹ️ No previous deployment found (first deployment)"
          fi

      - name: 📦 Deploy to Kubernetes
        env:
          APP_NAME: ${{ env.APP_NAME }}
          NAMESPACE: ${{ env.NAMESPACE }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          kubectl apply -f - <<EOF
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: $APP_NAME
            namespace: $NAMESPACE
            labels:
              app: $APP_NAME
              branch: $GITHUB_REF_NAME
          spec:
            replicas: 1
            strategy:
              type: RollingUpdate
              rollingUpdate:
                maxSurge: 1
                maxUnavailable: 0
            selector:
              matchLabels:
                app: $APP_NAME
                branch: $GITHUB_REF_NAME
            template:
              metadata:
                labels:
                  app: $APP_NAME
                  branch: $GITHUB_REF_NAME
              spec:
                containers:
                  - name: $APP_NAME
                    image: $REGISTRY/$IMAGE_NAME:$GITHUB_SHA
                    imagePullPolicy: Always
                    ports:
                      - name: http
                        containerPort: 3000
                    env:
                      - name: BREVO_API_KEY
                        valueFrom:
                          secretKeyRef:
                            name: $APP_NAME-env
                            key: BREVO_API_KEY
                      - name: DEV_TO_API_KEY
                        valueFrom:
                          secretKeyRef:
                            name: $APP_NAME-env
                            key: DEV_TO_API_KEY
                      - name: DEV_TO_API_URL
                        valueFrom:
                          secretKeyRef:
                            name: $APP_NAME-env
                            key: DEV_TO_API_URL
                      - name: NODE_ENV
                        value: "production"
                    resources:
                      requests:
                        cpu: 100m
                        memory: 256Mi
                      limits:
                        cpu: 500m
                        memory: 512Mi
                    livenessProbe:
                      httpGet:
                        path: /
                        port: http
                      initialDelaySeconds: 30
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3
                    readinessProbe:
                      httpGet:
                        path: /
                        port: http
                      initialDelaySeconds: 10
                      periodSeconds: 5
                      timeoutSeconds: 3
                      failureThreshold: 2
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: $APP_NAME
            namespace: $NAMESPACE
            labels:
              app: $APP_NAME
              branch: $GITHUB_REF_NAME
          spec:
            type: ClusterIP
            selector:
              app: $APP_NAME
              branch: $GITHUB_REF_NAME
            ports:
              - name: http
                port: 3000
                targetPort: http
          ---
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: $APP_NAME
            namespace: $NAMESPACE
            labels:
              app: $APP_NAME
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              kubernetes.io/ingress.class: nginx
          spec:
            tls:
              - hosts:
                  - mithamo.cc
                secretName: $APP_NAME-tls
            rules:
              - host: mithamo.cc
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: $APP_NAME
                          port:
                            number: 3000
          EOF

      - name: ⏳ Wait for deployment rollout
        env:
          APP_NAME: ${{ env.APP_NAME }}
          NAMESPACE: ${{ env.NAMESPACE }}
        run: |
          kubectl rollout status deployment/"$APP_NAME" -n "$NAMESPACE" --timeout=5m

  test-deployment:
    needs: deploy
    runs-on: [self-hosted, alma9]

    steps:
      - name: 🔧 Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: 🏗️ Configure kubectl context
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBE_CONFIG" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: ✅ Health check
        id: health-check
        env:
          APP_NAME: ${{ env.APP_NAME }}
          NAMESPACE: ${{ env.NAMESPACE }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          SERVICE_NAME="$APP_NAME"
          SERVICE_IP=$(kubectl get service "$SERVICE_NAME" -n "$NAMESPACE" -o jsonpath='{.spec.clusterIP}' || echo "")

          if [ -z "$SERVICE_IP" ]; then
            echo "❌ Could not find Service IP for $SERVICE_NAME"
            kubectl get svc -n "$NAMESPACE"
            exit 1
          fi

          echo "Checking health at http://$SERVICE_IP:3000"

          for i in {1..20}; do
            echo "Attempt $i: Waiting for application..."
            if kubectl run -n "$NAMESPACE" --rm -i --restart=Never --image=curlimages/curl:latest curl-check-$i -- curl -s -f "http://$SERVICE_IP:3000" > /dev/null 2>&1; then
              echo "✅ Application is healthy"
              echo "health_status=success" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Retrying in 10 seconds..."
            sleep 10
          done

          echo "❌ Application failed to start or is unreachable after 200 seconds"
          echo "health_status=failed" >> $GITHUB_OUTPUT
          echo ""
          echo "--- POD STATUS ---"
          kubectl get pods -n "$NAMESPACE" -l app="$APP_NAME",branch="$GITHUB_REF_NAME"

          echo ""
          echo "--- SERVICE DETAILS ---"
          kubectl describe service "$SERVICE_NAME" -n "$NAMESPACE"

          echo ""
          echo "--- ENDPOINTS ---"
          kubectl get endpoints "$SERVICE_NAME" -n "$NAMESPACE"

          echo ""
          echo "--- RECENT POD LOGS ---"
          POD_NAME=$(kubectl get pods -n "$NAMESPACE" -l app="$APP_NAME",branch="$GITHUB_REF_NAME" -o jsonpath='{.items[0].metadata.name}' || echo "")
          if [ -n "$POD_NAME" ]; then
            kubectl logs "$POD_NAME" -n "$NAMESPACE" --tail=50
          fi
          exit 1

      - name: 🔍 Deployment status
        if: success()
        env:
          APP_NAME: ${{ env.APP_NAME }}
          NAMESPACE: ${{ env.NAMESPACE }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          echo "### Deployment Status"
          kubectl get deployment -n "$NAMESPACE" -l app="$APP_NAME"
          echo ""
          echo "### Pods"
          kubectl get pods -n "$NAMESPACE" -l app="$APP_NAME",branch="$GITHUB_REF_NAME" -o wide
          echo ""
          echo "### Services"
          kubectl get svc -n "$NAMESPACE" -l app="$APP_NAME"
          echo ""
          echo "### Ingress"
          kubectl get ingress -n "$NAMESPACE" -l app="$APP_NAME"

      - name: 📊 Deployment summary
        if: success()
        env:
          APP_NAME: ${{ env.APP_NAME }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          NAMESPACE: ${{ env.NAMESPACE }}
        run: |
          {
            echo "## 🎉 Portfolio Deployment Successful"
            echo ""
            echo "### Application Details"
            echo "- **App**: $APP_NAME"
            echo "- **Branch**: $GITHUB_REF_NAME"
            echo "- **Image**: $REGISTRY/$IMAGE_NAME:$GITHUB_SHA"
            echo "- **Namespace**: $NAMESPACE"
            echo ""
            echo "### Access URLs"
            echo "- **URL**: https://mithamo.cc"
          } >> $GITHUB_STEP_SUMMARY

  rollback:
    if: failure() && needs.test-deployment.result == 'failure'
    needs: [deploy, test-deployment]
    runs-on: [self-hosted, alma9]

    steps:
      - name: 🔧 Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: 🏗️ Configure kubectl context
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBE_CONFIG" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: 💾 Retrieve previous state
        id: previous-state
        continue-on-error: true
        env:
          APP_NAME: ${{ env.APP_NAME }}
          NAMESPACE: ${{ env.NAMESPACE }}
        run: |
          DEPLOYMENT_NAME="$APP_NAME"
          echo "deployment_name=$DEPLOYMENT_NAME" >> $GITHUB_OUTPUT

          CURRENT_IMAGE=$(kubectl get deployment "$DEPLOYMENT_NAME" -n "$NAMESPACE" -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "")

          echo "current_image=$CURRENT_IMAGE" >> $GITHUB_OUTPUT

          if [ -n "$CURRENT_IMAGE" ]; then
            echo "Current deployment image: $CURRENT_IMAGE"
          else
            echo "No previous deployment found"
          fi

      - name: 🔄 Rollback deployment
        if: steps.previous-state.outputs.current_image != ''
        env:
          NAMESPACE: ${{ env.NAMESPACE }}
          DEPLOYMENT_NAME: ${{ steps.previous-state.outputs.deployment_name }}
        run: |
          echo "⚠️ Deployment tests failed. Rolling back to previous version..."

          kubectl rollout undo deployment/"$DEPLOYMENT_NAME" -n "$NAMESPACE"

          kubectl rollout status deployment/"$DEPLOYMENT_NAME" -n "$NAMESPACE" --timeout=5m

          echo "✅ Rollback completed successfully"
          echo ""
          echo "--- ROLLED BACK DEPLOYMENT STATUS ---"
          kubectl get deployment "$DEPLOYMENT_NAME" -n "$NAMESPACE" -o wide

      - name: 🚨 Rollback notification
        if: steps.previous-state.outputs.current_image == ''
        run: |
          echo "❌ Deployment tests failed and no previous version exists to rollback to."
          echo "This was likely the first deployment. Please investigate the deployment logs above."
          exit 1
